services:
  caddy:
    profiles: ["caddy"]
    image: caddy:2.8-alpine
    container_name: mobilechat-caddy
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?APP_DOMAIN is required, for example api.example.com}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - mobilechat

  postgres:
    image: postgres:16-alpine
    container_name: mobilechat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mobilechat

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mobilechat-migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/app/mobilechat-migrate"]
    environment:
      APP_ENV: ${APP_ENV:-production}
      RUN_MIGRATIONS_ON_START: "false"
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ACCESS_TOKEN_TTL_MINUTES: ${ACCESS_TOKEN_TTL_MINUTES:-60}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?ALLOWED_ORIGINS is required}
      BCRYPT_COST: ${BCRYPT_COST:-12}
      SMS_PROVIDER: ${SMS_PROVIDER:?SMS_PROVIDER is required}
      SMS_FROM: ${SMS_FROM:-MobileChat}
      SUPER_ADMIN_PHONES: ${SUPER_ADMIN_PHONES:-}
      PLATFORM_ADMIN_PHONES: ${PLATFORM_ADMIN_PHONES:-}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      FCM_CLIENT_EMAIL: ${FCM_CLIENT_EMAIL:-}
      FCM_PRIVATE_KEY: ${FCM_PRIVATE_KEY:-}
      CONTENT_MODERATION_ENABLED: ${CONTENT_MODERATION_ENABLED:-true}
      CONTENT_MODERATION_PROVIDER: ${CONTENT_MODERATION_PROVIDER:-huggingface}
      HF_TOKEN: ${HF_TOKEN:-}
      HF_MODERATION_MODEL: ${HF_MODERATION_MODEL:-unitary/multilingual-toxic-xlm-roberta}
      HF_MODERATION_ENDPOINT: ${HF_MODERATION_ENDPOINT:-https://api-inference.huggingface.co/models}
      HF_MODERATION_THRESHOLD: ${HF_MODERATION_THRESHOLD:-0.72}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODERATION_MODEL: ${OPENAI_MODERATION_MODEL:-omni-moderation-latest}
      OPENAI_MODERATION_ENDPOINT: ${OPENAI_MODERATION_ENDPOINT:-https://api.openai.com/v1/moderations}
      MODERATION_FAIL_CLOSED: ${MODERATION_FAIL_CLOSED:-false}
    networks:
      - mobilechat

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mobilechat-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      RUN_MIGRATIONS_ON_START: "false"
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ACCESS_TOKEN_TTL_MINUTES: ${ACCESS_TOKEN_TTL_MINUTES:-60}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?ALLOWED_ORIGINS is required}
      BCRYPT_COST: ${BCRYPT_COST:-12}
      SMS_PROVIDER: ${SMS_PROVIDER:?SMS_PROVIDER is required}
      SMS_FROM: ${SMS_FROM:-MobileChat}
      SUPER_ADMIN_PHONES: ${SUPER_ADMIN_PHONES:-}
      PLATFORM_ADMIN_PHONES: ${PLATFORM_ADMIN_PHONES:-}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      FCM_CLIENT_EMAIL: ${FCM_CLIENT_EMAIL:-}
      FCM_PRIVATE_KEY: ${FCM_PRIVATE_KEY:-}
      CONTENT_MODERATION_ENABLED: ${CONTENT_MODERATION_ENABLED:-true}
      CONTENT_MODERATION_PROVIDER: ${CONTENT_MODERATION_PROVIDER:-huggingface}
      HF_TOKEN: ${HF_TOKEN:-}
      HF_MODERATION_MODEL: ${HF_MODERATION_MODEL:-unitary/multilingual-toxic-xlm-roberta}
      HF_MODERATION_ENDPOINT: ${HF_MODERATION_ENDPOINT:-https://api-inference.huggingface.co/models}
      HF_MODERATION_THRESHOLD: ${HF_MODERATION_THRESHOLD:-0.72}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODERATION_MODEL: ${OPENAI_MODERATION_MODEL:-omni-moderation-latest}
      OPENAI_MODERATION_ENDPOINT: ${OPENAI_MODERATION_ENDPOINT:-https://api.openai.com/v1/moderations}
      MODERATION_FAIL_CLOSED: ${MODERATION_FAIL_CLOSED:-false}
    ports:
      - "127.0.0.1:${API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - mobilechat

  backup:
    image: postgres:16-alpine
    container_name: mobilechat-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - ./backups:/backups
      - ./scripts:/scripts:ro
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        while true; do
          tr -d '\r' < /scripts/backup-postgres.sh > /tmp/backup-postgres.sh
          sh /tmp/backup-postgres.sh
          sleep 86400
        done
    networks:
      - mobilechat

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  mobilechat:
    driver: bridge

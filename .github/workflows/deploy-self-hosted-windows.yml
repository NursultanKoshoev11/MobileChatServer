name: Deploy MobileChatServer on Windows Docker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mobilechatserver-windows-docker-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Rebuild and restart Docker containers
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Deploy from local server folder
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $candidates = @()
          if ($env:MOBILECHAT_SERVER_DEPLOY_PATH) {
            $candidates += $env:MOBILECHAT_SERVER_DEPLOY_PATH
          }
          if ($env:USERPROFILE) {
            $candidates += (Join-Path $env:USERPROFILE "Desktop\test\MobileChatServer")
          }
          $candidates += "C:\deploy\MobileChatServer"
          $candidates += "C:\MobileChatServer"

          $DeployPath = $null
          foreach ($candidate in $candidates) {
            if ($candidate -and (Test-Path $candidate)) {
              $DeployPath = $candidate
              break
            }
          }

          if (-not $DeployPath) {
            Write-Host "Deploy path was not found. Checked candidates:"
            $candidates | ForEach-Object { Write-Host " - $_" }
            Write-Host "USERPROFILE=$env:USERPROFILE"
            Write-Host "USERNAME=$env:USERNAME"
            throw "Deploy path not found. Set MOBILECHAT_SERVER_DEPLOY_PATH or move the project to C:\deploy\MobileChatServer."
          }

          Set-Location $DeployPath

          Write-Host "Current directory: $(Get-Location)"
          Write-Host "Current branch and commit before update:"
          git status --short
          git rev-parse --abbrev-ref HEAD
          git rev-parse --short HEAD

          if (-not (Test-Path ".env")) {
            throw ".env file not found in $DeployPath. Keep production secrets in this local .env file."
          }

          Write-Host "Updating local repository from origin/main..."
          git fetch origin main
          git reset --hard origin/main

          Write-Host "Docker version:"
          docker version
          docker compose version

          Write-Host "Starting postgres..."
          docker compose up -d postgres

          Write-Host "Building API image..."
          docker compose build api

          Write-Host "Running database migrations..."
          docker compose run --rm --entrypoint /app/mobilechat-migrate api

          Write-Host "Restarting API container..."
          docker compose up -d --force-recreate api

          Write-Host "Current containers:"
          docker compose ps

          Write-Host "Waiting for API health check..."
          $healthOk = $false
          for ($i = 1; $i -le 30; $i++) {
            try {
              $response = Invoke-WebRequest -UseBasicParsing -Uri "http://localhost:8080/api/health" -TimeoutSec 3
              if ($response.StatusCode -eq 200) {
                $healthOk = $true
                break
              }
            } catch {
              Start-Sleep -Seconds 2
            }
          }

          if (-not $healthOk) {
            Write-Host "API health check failed. Last API logs:"
            docker logs mobilechat-api --tail=200
            throw "MobileChat API did not become healthy."
          }

          Write-Host "API is healthy. Last API logs:"
          docker logs mobilechat-api --tail=80

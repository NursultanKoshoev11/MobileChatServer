name: Backend Check and Deploy on AWS Runner

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to AWS self-hosted runner"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

concurrency:
  group: mobilechatserver-backend-aws-runner
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
          cache: true

      - name: Go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Go test
        run: go test ./...

      - name: Go vet
        run: go vet ./...

      - name: Go vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Build server
        run: go build ./cmd/server

      - name: Build migrate
        run: go build ./cmd/migrate

  deploy:
    needs: backend
    runs-on: [self-hosted, Linux]
    timeout-minutes: 25
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true'))

    steps:
      - name: Deploy from server working copy
        run: |
          set -euo pipefail
          cd /opt/projects/MobileChatServer
          git fetch origin main
          git checkout -B main origin/main
          git reset --hard origin/main

          if ! free | awk '/Swap:/ { exit !($2 > 0) }'; then
            echo "No swap detected. Creating temporary 2G swapfile for Docker build."
            sudo fallocate -l 2G /swapfile-github-actions || sudo dd if=/dev/zero of=/swapfile-github-actions bs=1M count=2048
            sudo chmod 600 /swapfile-github-actions
            sudo mkswap /swapfile-github-actions
            sudo swapon /swapfile-github-actions
          else
            echo "Swap is already available."
          fi

          echo "Cleaning Docker cache and unused deployment artifacts."
          docker builder prune -af || true
          docker container prune -f || true
          docker image prune -af || true
          sudo apt-get clean || true
          sudo journalctl --vacuum-size=100M || true
          sudo mkdir -p data/public-files
          sudo chown -R 10001:10001 data
          sudo chmod -R u+rwX,g+rX,o-rwx data

          migrate_name="mobilechat-migrate-$(date +%s)"
          docker compose --env-file .env.prod -f docker-compose.prod.yml --profile caddy run --rm --name "$migrate_name" migrate

          if docker ps -a --format '{{.Names}}' | grep -qx mobilechat-caddy; then
            caddy_service_label="$(docker inspect mobilechat-caddy --format '{{ index .Config.Labels "com.docker.compose.service" }}' 2>/dev/null || true)"
            if [ "$caddy_service_label" != "caddy" ]; then
              echo "Replacing manually-created Caddy container with compose-managed Caddy."
              docker rm -f mobilechat-caddy
            fi
          fi

          COMPOSE_DOCKER_CLI_BUILD=1 DOCKER_BUILDKIT=1 docker compose --env-file .env.prod -f docker-compose.prod.yml --profile caddy up -d --build api postgres backup caddy
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8080/api/health >/dev/null && curl -fsS https://koommy.duckdns.org/api/health >/dev/null; then
              echo "Health check OK"
              docker ps
              docker image prune -af || true
              exit 0
            fi
            echo "Waiting for API... $i"
            sleep 2
          done
          echo "Health check failed"
          docker logs --tail 120 mobilechat-api || true
          exit 20

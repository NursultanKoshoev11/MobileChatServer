name: Backend Test Lab CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'
          cache: true
      - name: Go test
        run: go test ./...
      - name: Go vet
        run: go vet ./...
      - name: Go vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: Build server
        run: go build ./cmd/server
      - name: Build migrate
        run: go build ./cmd/migrate

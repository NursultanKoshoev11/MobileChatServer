name: Server CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mobilechat_test
          POSTGRES_USER: mobilechat
          POSTGRES_PASSWORD: mobilechat_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mobilechat -d mobilechat_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: test
      PORT: 8080
      DATABASE_URL: postgres://mobilechat:mobilechat_password@localhost:5432/mobilechat_test?sslmode=disable
      JWT_SECRET: test-secret-with-at-least-32-characters
      ACCESS_TOKEN_TTL_MINUTES: 60
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8080
      BCRYPT_COST: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Go fmt check
        run: test -z "$(gofmt -l .)"

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./...

      - name: Build
        run: go build ./cmd/server

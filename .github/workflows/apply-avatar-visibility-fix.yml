name: Apply avatar visibility fix

on:
  push:
    branches:
      - fix/avatar-and-group-images-20260720
    paths:
      - tools/patch_avatar_visibility.py
      - .github/workflows/apply-avatar-visibility-fix.yml

permissions:
  contents: write

jobs:
  patch-test-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/avatar-and-group-images-20260720
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Apply deterministic patch
        run: python3 tools/patch_avatar_visibility.py
      - name: Format Go files
        run: gofmt -w internal/domain/public_requests.go internal/domain/phone_auth.go internal/storage/repository.go internal/storage/repository_phone_auth.go internal/storage/repository_public_requests.go internal/httpapi/group_avatar_handlers.go
      - name: Run backend tests
        run: go test ./...
      - name: Commit verified fix
        run: |
          git config user.name "ChatGPT"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Fix avatar and group image propagation"
          git push origin HEAD:fix/avatar-and-group-images-20260720

name: Container Scan

on:
  push:
  pull_request:
  schedule:
    - cron: '0 4 * * 1'

jobs:
  trivy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t mobilechat-server:ci .

      - name: Scan image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: mobilechat-server:ci
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
